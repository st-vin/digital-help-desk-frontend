<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MKU Helpdesk — Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-mark">MK</div>
        <div class="auth-logo-name">MKU Helpdesk</div>
        <div class="auth-logo-sub">Mount Kenya University — Student Support Portal</div>
      </div>

      <div id="alert" class="alert alert-error hidden" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" name="email"
                 placeholder="you@mku.ac.ke" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div class="form-group mt-md">
          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            Sign In
          </button>
        </div>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-help-box">
        <div class="label-md" style="margin-bottom:6px;">Need a new verification link?</div>
        <form id="resendForm" class="auth-inline-form" novalidate>
          <input class="form-control" type="email" id="resendEmail"
                 placeholder="you@mku.ac.ke" autocomplete="email" />
          <button type="submit" class="btn btn-secondary" id="resendBtn">Resend</button>
        </form>
        <div class="auth-note">If an unverified account exists for that email, a new link has been sent.</div>
      </div>

      <div class="text-center">
        <span class="text-sm text-muted">New student?</span>
        <a href="register.html" class="btn-ghost btn-sm" style="display:inline-flex; padding:6px 10px;">
          Create Account
        </a>
      </div>
    </div>

    <p style="color:rgba(255,255,255,0.55); font-size:12px; margin-top:20px; text-align:center;">
      &copy; 2025 Mount Kenya University. All rights reserved.
    </p>
  </div>

  <script type="module">
    import {
      authApi,
      auth,
      showAlert,
      hideAlert,
      authCopy,
      isEmailVerificationRequiredError
    } from './assets/js/api.js';

    // Redirect if already logged in
    if (auth.isLoggedIn()) auth.redirectByRole();

    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertEl   = document.getElementById('alert');
    const resendForm = document.getElementById('resendForm');
    const resendEmail = document.getElementById('resendEmail');
    const resendBtn = document.getElementById('resendBtn');

    function setSubmitLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.classList.toggle('btn-loading', isLoading);
      submitBtn.textContent = isLoading ? 'Signing in…' : 'Sign In';
    }

    function setResendLoading(isLoading) {
      resendBtn.disabled = isLoading;
      resendBtn.classList.toggle('btn-loading', isLoading);
      resendBtn.textContent = isLoading ? 'Sending…' : 'Resend';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertEl);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      resendEmail.value = email;

      if (!email || !password) {
        showAlert(alertEl, 'Please enter your email and password.', 'error');
        return;
      }

      setSubmitLoading(true);

      try {
        const data = await authApi.login({ email, password });
        auth.save(data);
        auth.redirectByRole();
      } catch (err) {
        if (isEmailVerificationRequiredError(err)) {
          showAlert(alertEl, authCopy.loginVerifyRequired, 'warning');
          resendEmail.value = email;
        } else {
          showAlert(alertEl, authCopy.loginInvalid, 'error');
        }
        setSubmitLoading(false);
      }
    });

    resendForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = resendEmail.value.trim();
      if (!email) {
        showAlert(alertEl, 'Enter the email address you used to register.', 'error');
        return;
      }

      hideAlert(alertEl);
      setResendLoading(true);

      try {
        await authApi.resendVerification(email);
      } catch (_) {
        // Intentionally ignore account-existence details.
      } finally {
        setResendLoading(false);
        showAlert(alertEl, authCopy.resendNeutral, 'info');
      }
    });
  </script>
</body>
</html>
